<!DOCTYPE html>
<html lang="en">
<head>
    <!-- ERROR CATCHER FOR DEBUGGING -->
    <script>
    window.onerror = function(msg, url, line) {
        const errDiv = document.createElement('div');
        errDiv.style = "position:fixed;top:0;left:0;right:0;background:red;color:white;z-index:999999;padding:20px;font-size:16px;word-break:break-all;";
        errDiv.innerText = "Error: " + msg + "\nLine: " + line;
        document.body.appendChild(errDiv);
    };
    window.addEventListener('unhandledrejection', function(event) {
        const errDiv = document.createElement('div');
        errDiv.style = "position:fixed;top:0;left:0;right:0;background:darkred;color:white;z-index:999999;padding:20px;font-size:16px;word-break:break-all;";
        errDiv.innerText = "Promise Error: " + (event.reason ? event.reason.message || event.reason : event);
        document.body.appendChild(errDiv);
    });
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="description" content="Remindo — Your personal life manager. Track birthdays, bills, deadlines, medicines, and more. Never forget what matters.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Remindo">

    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="assets/icon.png">
    <link rel="apple-touch-icon" href="assets/icon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">

    <!-- Flatpickr (Modern Premium Datepicker) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">

    <title>Remindo — Never Forget What Matters</title>
</head>
<body>
    <!-- ===== SPLASH SCREEN ===== -->
    <div id="splashScreen" class="splash-screen">
        <img src="assets/icon.png" alt="Remindo Loading" class="splash-logo">
        <div class="splash-spinner"></div>
    </div>

    <!-- ===== AUTH OVERLAY ===== -->
    <div id="authWrapper" class="auth-wrapper hidden">
        <!-- AuthPage will render here -->
    </div>

    <div id="app" class="hidden">
        <!-- ===== TOP BAR ===== -->
        <header class="top-bar" id="topBar">
            <div class="top-bar__left">
                <button class="top-bar__back hidden" id="backBtn" aria-label="Go back">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15 18l-6-6 6-6"/>
                    </svg>
                </button>
                <h1 class="top-bar__title" id="pageTitle">Remindo</h1>
            </div>
            <div class="top-bar__right" style="position: relative;">
                <button class="top-bar__profile" id="profileBtn" aria-label="Profile">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="8" r="4"/>
                        <path d="M20 21a8 8 0 0 0-16 0"/>
                    </svg>
                </button>

                <!-- PROFILE DROPDOWN -->
                <div class="profile-dropdown hidden" id="profileDropdown">
                    <div class="profile-dropdown__header" style="padding: 12px 16px; border-bottom: 1px solid var(--border); margin-bottom: 8px;">
                        <div id="profileDropdownName" style="font-weight: 700; font-size: 0.95rem; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">User Name</div>
                        <div id="profileDropdownEmail" style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">user@example.com</div>
                    </div>
                    
                    <button class="profile-dropdown__item" id="btnToggleTheme">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="5"/>
                            <line x1="12" y1="1" x2="12" y2="3"/>
                            <line x1="12" y1="21" x2="12" y2="23"/>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                            <line x1="1" y1="12" x2="3" y2="12"/>
                            <line x1="21" y1="12" x2="23" y2="12"/>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                        </svg>
                        <span id="themeLabel">Light Mode</span>
                    </button>
                    
                    <button class="profile-dropdown__item" id="btnAbout">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="12" y1="16" x2="12" y2="12"/>
                            <line x1="12" y1="8" x2="12.01" y2="8"/>
                        </svg>
                        <span>About Remindo</span>
                    </button>
                    
                    <div class="profile-dropdown__divider"></div>
                    
                    <button class="profile-dropdown__item profile-dropdown__item--danger" id="btnLogout">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                            <polyline points="16 17 21 12 16 7"/>
                            <line x1="21" y1="12" x2="9" y2="12"/>
                        </svg>
                        <span>Logout</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- ===== MAIN CONTENT ===== -->
        <main class="main-content" id="mainContent">
            <!-- Pages rendered dynamically by router -->
        </main>

        <!-- ===== BOTTOM NAVIGATION ===== -->
        <nav class="bottom-nav" id="bottomNav">
            <button class="bottom-nav__item active" data-nav="home" id="navHome" aria-label="Home">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
                <span>Home</span>
            </button>
            <button class="bottom-nav__item" data-nav="sections" id="navSections" aria-label="Sections">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7" rx="1.5"/>
                    <rect x="14" y="3" width="7" height="7" rx="1.5"/>
                    <rect x="3" y="14" width="7" height="7" rx="1.5"/>
                    <rect x="14" y="14" width="7" height="7" rx="1.5"/>
                </svg>
                <span>Sections</span>
            </button>
            <button class="bottom-nav__item" data-nav="settings" id="navSettings" aria-label="Settings">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
                <span>Settings</span>
            </button>
        </nav>

        <!-- ===== SECTIONS DRAWER ===== -->
        <div class="overlay hidden" id="drawerOverlay"></div>
        <div class="drawer hidden" id="sectionsDrawer">
            <div class="drawer__handle"></div>
            <h2 class="drawer__title">All Sections</h2>
            <div class="drawer__grid" id="drawerGrid">
                <a class="drawer__item" href="#/birthdays" data-section="birthdays">
                    <span class="drawer__icon">🎂</span>
                    <span class="drawer__label">Birthdays</span>
                </a>
                <a class="drawer__item" href="#/bills" data-section="bills">
                    <span class="drawer__icon">💡</span>
                    <span class="drawer__label">Bills</span>
                </a>
                <a class="drawer__item" href="#/student" data-section="student">
                    <span class="drawer__icon">🎓</span>
                    <span class="drawer__label">Student</span>
                </a>
                <a class="drawer__item" href="#/jobs" data-section="jobs">
                    <span class="drawer__icon">💼</span>
                    <span class="drawer__label">Jobs</span>
                </a>
                <a class="drawer__item" href="#/medicines" data-section="medicines">
                    <span class="drawer__icon">💊</span>
                    <span class="drawer__label">Medicines</span>
                </a>
                <a class="drawer__item" href="#/wishlist" data-section="wishlist">
                    <span class="drawer__icon">🛒</span>
                    <span class="drawer__label">Wishlist</span>
                </a>
                <a class="drawer__item" href="#/sizes" data-section="sizes">
                    <span class="drawer__icon">📏</span>
                    <span class="drawer__label">My Sizes</span>
                </a>
            </div>
        </div>

        <!-- ===== MODAL (Bottom Sheet) ===== -->
        <div class="overlay hidden" id="modalOverlay"></div>
        <div class="modal hidden" id="modal">
            <div class="modal__handle"></div>
            <div class="modal__header">
                <h2 class="modal__title" id="modalTitle">Add Item</h2>
                <button class="modal__close" id="modalClose" aria-label="Close modal">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="modal__content" id="modalContent">
                <!-- Form content injected dynamically -->
            </div>
        </div>

        <!-- ===== CONFIRM DIALOG ===== -->
        <div class="overlay hidden" id="confirmOverlay"></div>
        <div class="confirm-dialog hidden" id="confirmDialog">
            <div class="confirm-dialog__icon">⚠️</div>
            <h3 class="confirm-dialog__title" id="confirmTitle">Delete Item?</h3>
            <p class="confirm-dialog__text" id="confirmText">This action cannot be undone.</p>
            <div class="confirm-dialog__actions">
                <button class="btn btn--ghost" id="confirmCancel">Cancel</button>
                <button class="btn btn--danger" id="confirmOk">Delete</button>
            </div>
        </div>

        <!-- ===== POPUP DIALOG (Centered) ===== -->
        <div class="overlay hidden" id="popupOverlay"></div>
        <div class="confirm-dialog hidden" id="popupDialog" style="padding: 0; width: min(340px, calc(100vw - 32px));">
            <button class="modal__close" id="popupClose" aria-label="Close popup" style="position: absolute; top: 12px; right: 12px; z-index: 10; width: 28px; height: 28px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <path d="M18 6L6 18M6 6l12 12"/>
                </svg>
            </button>
            <div id="popupContent" style="max-height: 95vh; overflow-y: hidden; padding: 24px 20px 20px;">
                <!-- Dynamic Content -->
            </div>
        </div>

        <!-- ===== TOAST CONTAINER ===== -->
        <div class="toast-container" id="toastContainer"></div>
    </div>

    <!-- Firebase SDK (loaded but inactive until configured) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

    <!-- Flatpickr JS -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <!-- App Scripts (order matters) -->
    <script src="js/firebase-config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/store.js"></script>
    <script src="js/router.js"></script>
    <script src="js/notifications.js"></script>
    
    <script src="js/pages/home.js"></script>
    <script src="js/pages/birthdays.js"></script>
    <script src="js/pages/bills.js"></script>
    <script src="js/pages/student.js"></script>
    <script src="js/pages/jobs.js"></script>
    <script src="js/pages/medicines.js"></script>
    <script src="js/pages/wishlist.js"></script>
    <script src="js/pages/sizes.js"></script>
    <script src="js/pages/reminders.js"></script>
    <script src="js/pages/auth.js"></script>


    <script src="js/app.js"></script>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('✅ Service Worker registered'))
                    .catch(err => console.warn('⚠️ SW registration failed:', err));
            });
        }
    </script>
</body>
</html>
